<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - LearnSpace</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#0B2447,#19376D);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px;
}

.container{
    width:100%;
    max-width:1100px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:30px;
}

.card{
    background:white;
    padding:35px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.card h2{
    text-align:center;
    color:#0B2447;
    margin-bottom:25px;
}

.input-box{
    margin-bottom:18px;
}

.input-box label{
    display:block;
    margin-bottom:8px;
    font-weight:500;
    color:#333;
}

.input-box input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:10px;
    outline:none;
}

.input-box input:focus{
    border-color:#19376D;
}

.btn{
    width:100%;
    border:none;
    background:#0B2447;
    color:white;
    padding:12px;
    border-radius:30px;
    font-size:16px;
    cursor:pointer;
    margin-top:10px;
}

.btn:hover{
    background:#19376D;
}

.links{
    margin-top:15px;
    display:flex;
    justify-content:space-between;
}

.links a{
    text-decoration:none;
    color:#0B2447;
    font-size:14px;
}

.links a:hover{
    text-decoration:underline;
}

.register{
    text-align:center;
    margin-top:20px;
}

.register a{
    color:#0B2447;
    font-weight:600;
    text-decoration:none;
}

.register a:hover{
    text-decoration:underline;
}

@media(max-width:900px){

.container{
    grid-template-columns:1fr;
}

.home-container{
    grid-column:1/-1;
    display:flex;
    justify-content:center;
    margin-top:20px;
}

}

.home-btn{
    width:220px;
    padding:12px;
    border:none;
    border-radius:20px;
    background:white;
    color:black;
    font-size:16px;
    font-weight:500;
    cursor:pointer;
}

.home-btn:hover{
    background:#357ABD;
}

</style>
</head>

<body>

<div class="container">

<!-- STUDENT LOGIN -->

<div class="card">

<h2>
<i class="fa-solid fa-user-graduate"></i>
Student Login
</h2>

<form id="studentLoginForm">

<div class="input-box">
<label>Student ID</label>
<input
type="text"
id="studentId"
placeholder="Enter Student ID">
</div>

<div class="input-box">
<label>Student Name</label>
<input
type="text"
id="studentName"
list="studentNames"
placeholder="Enter Student Name">

<datalist id="studentNames"></datalist>
</div>

<div class="input-box">
<label>Password</label>
<input
type="password"
id="studentPassword"
placeholder="Enter Password">
</div>

<button class="btn" type="submit">
Login
</button>

<p id="studentMessage"
style="text-align:center;color:red;margin-top:15px;"></p>

<div class="links">

<a href="forgot-password.html">
Forgot Password?
</a>

<a href="reset-password.html">
Reset Password
</a>

</div>

<div class="register">

<p>New Student?</p>

<a href="register.html">
Register Here
</a>

</div>

</form>

</div><!-- ADMIN LOGIN -->

<div class="card">

    <h2>
        <i class="fa-solid fa-user-shield"></i>
        Admin Login
    </h2>

    <form id="adminLoginForm">

        <div class="input-box">
            <label>Admin ID</label>
            <input
                type="text"
                id="adminId"
                placeholder="Enter Admin ID">
        </div>

        <div class="input-box">
            <label>Admin Name</label>
            <input
                type="text"
                id="adminName"
                list="adminNames"
                placeholder="Enter Admin Name">

            <datalist id="adminNames"></datalist>
        </div>

        <div class="input-box">
            <label>Password</label>
            <input
                type="password"
                id="adminPassword"
                placeholder="Enter Password">
        </div>

        <button class="btn" type="submit">
            Login
        </button>

        <p id="adminMessage"
        style="text-align:center;color:red;margin-top:15px;"></p>

        <div class="links">

            <a href="forgot-password.html">
                Forgot Password?
            </a>

            <a href="reset-password.html">
                Reset Password
            </a>

        </div>

        <div class="register">

            <p>New Admin?</p>

            <a href="adminregister.html">
                Register Here
            </a>

        </div>

    </form>

</div>

<div class="home-container">

<button class="home-btn"
onclick="window.location.href='home.html'">

<i class="fa-solid fa-house"></i>
Back to Home

</button>

</div><script>

// ================= STUDENT LOGIN =================

document.getElementById("studentLoginForm").addEventListener("submit", function(e){

    e.preventDefault();

    const studentId =
    document.getElementById("studentId").value.trim();

    const studentName =
    document.getElementById("studentName").value.trim();

    const studentPassword =
    document.getElementById("studentPassword").value.trim();

    const studentMessage =
    document.getElementById("studentMessage");

    studentMessage.style.color = "red";

    if(studentId === ""){
        studentMessage.innerHTML = "Please enter Student ID.";
        return;
    }

    if(studentName === ""){
        studentMessage.innerHTML = "Please enter Student Name.";
        return;
    }

    if(studentPassword === ""){
        studentMessage.innerHTML = "Please enter Password.";
        return;
    }

    studentMessage.style.color = "green";
    studentMessage.innerHTML = "Login Successful! Redirecting...";

    setTimeout(function(){

        window.location.href = "course.html";

    },1000);

});


// ================= ADMIN LOGIN =================

document.getElementById("adminLoginForm").addEventListener("submit", function(e){

    e.preventDefault();

    const adminId =
    document.getElementById("adminId").value.trim();

    const adminName =
    document.getElementById("adminName").value.trim();

    const adminPassword =
    document.getElementById("adminPassword").value.trim();

    const adminMessage =
    document.getElementById("adminMessage");

    adminMessage.style.color = "red";

    if(adminId === ""){
        adminMessage.innerHTML = "Please enter Admin ID.";
        return;
    }

    if(adminName === ""){
        adminMessage.innerHTML = "Please enter Admin Name.";
        return;
    }

    if(adminPassword === ""){
        adminMessage.innerHTML = "Please enter Password.";
        return;
    }

    adminMessage.style.color = "green";
    adminMessage.innerHTML = "Login Successful! Redirecting...";

    setTimeout(function(){

        window.location.href = "admincourse.html";

    },1000);

});

</script>

</body>
</html>
