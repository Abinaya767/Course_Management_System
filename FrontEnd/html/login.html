<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login - LearnSpace</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- External CSS -->
    <link rel="stylesheet" href="../css/logincss.css">

</head>

<body>

<div class="container">

<!-- ================= STUDENT LOGIN ================= -->

<div class="card">

<h2>
<i class="fa-solid fa-user-graduate"></i>
Student Login
</h2>

<form action="course.html">

<div class="input-box">
<label>Student ID</label>

<input
type="text"
name="studentId"
placeholder="Enter Student ID"
required>

</div>

<div class="input-box">

<label>Student Name</label>

<input
type="text"
name="studentName"
placeholder="Enter Student Name"
required>

</div>

<div class="input-box">

<label>Password</label>

<input
type="password"
name="studentPassword"
placeholder="Enter Password"
required>

</div>

<button class="btn" type="submit">
Login
</button>

<div class="links">

<a href="forgot-password.html">
Forgot Password?
</a>

<a href="reset-password.html">
Reset Password
</a>

</div>

<div class="register">

<p>New Student?</p>

<a href="register.html">
Register Here
</a>

</div>

</form>

</div>

<!-- ================= ADMIN LOGIN ================= -->

<div class="card">

<h2>
<i class="fa-solid fa-user-shield"></i>
Admin Login
</h2>

<form action="dashboard.html">

<div class="input-box">

<label>Admin ID</label>

<input
type="text"
name="adminId"
placeholder="Enter Admin ID"
required>

</div>

<div class="input-box">

<label>Admin Name</label>

<input
type="text"
name="adminName"
placeholder="Enter Admin Name"
required>

</div>

<div class="input-box">

<label>Password</label>

<input
type="password"
name="adminPassword"
placeholder="Enter Password"
required>

</div>

<button class="btn" type="submit">
Login
</button>

<div class="links">

<a href="forgot-password.html">
Forgot Password?
</a>

<a href="reset-password.html">
Reset Password
</a>

</div>

<div class="register">

<p>New Admin?</p>

<a href="adminregister.html">
Register Here
</a><!-- ================= BACK TO HOME ================= -->

<div class="home-container">

    <a href="home.html" class="home-btn">
        <i class="fa-solid fa-house"></i>
        Back to Home
    </a>

</div>

</div>

</body>
</html>

</div>

</form>

</div>
