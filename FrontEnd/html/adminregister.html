<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Register - LearnSpace</title>


<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">


<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">


<!-- External CSS -->

<link rel="stylesheet" href="../css/adminregistercss.css">


</head>


<body>


<div class="card">


<h2>

<i class="fa-solid fa-user-shield"></i>

Admin Registration

</h2>



<form id="registerForm">


<!-- Admin ID -->

<div class="input-box">

<label>
Admin ID
</label>


<input
type="text"
id="adminId"
placeholder="Enter Admin ID">

</div>




<!-- Admin Name -->

<div class="input-box">

<label>
Admin Name
</label>


<input
type="text"
id="name"
placeholder="Enter Admin Name">

</div>




<!-- Email -->

<div class="input-box">

<label>
Email Address
</label>


<input
type="email"
id="email"
placeholder="Enter your email"
required>

</div><!-- Password -->

<div class="input-box">

<label>
Password
</label>

<input
type="password"
id="password"
placeholder="Create password">

</div>



<!-- Confirm Password -->

<div class="input-box">

<label>
Confirm Password
</label>

<input
type="password"
id="confirmPassword"
placeholder="Confirm password">

</div>




<!-- Terms -->

<div class="terms">

<input 
type="checkbox"
id="agree">


<label for="agree">

I agree to the Terms & Conditions

</label>


</div>




<!-- Register Button -->

<button
type="submit"
class="btn">

Register & Continue

</button>




<p class="message"></p>



</form>





<!-- Login Link -->

<div class="login-link">

Already have an account?

<a href="login.html">

Login Here

</a>


</div>





<!-- Back Home Button -->

<a href="home.html" class="back-btn">


<i class="fa-solid fa-house"></i>

Back to Home


</a>



</div>


</body>

</html>
